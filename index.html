<!DOCTYPE html>
<html>
<head>
  <title>Card Validator</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      background: #fff;
      color: #333;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      min-height: 100vh;
      padding: 40px;
      text-align: center;
    }
    h2 {
      margin-bottom: 20px;
    }
    input {
      padding: 8px;
      width: 250px;
    }
    button {
      padding: 8px 12px;
      margin-left: 10px;
    }
    #result {
      margin-top: 20px;
      font-weight: bold;
    }
    #logo {
      margin-top: 15px;
      height: 60px;
      display: none;
    }
    footer {
      margin-top: auto;
      padding: 20px;
    }
    .campaign-name span:first-child {
      color: gold;
      font-weight: bold;
      font-size: 18px;
    }
    .campaign-name span:not(:first-child) {
      color: red;
      font-weight: bold;
      font-size: 18px;
    }
    .campaigns {
      display: flex;
      gap: 40px;
      justify-content: center;
    }
  </style>
</head>
<body>
  <h2>REMINDERS Card Validator</h2>
  <div>
    <input type="text" id="cardNumber" placeholder="Enter card number">
    <button onclick="validateCard()">Validate</button>
  </div>
  <div id="result"></div>
  <div id="logo"></div>

  <!-- Campaign logos -->
    <div class="campaigns">
      <div class="campaign-name"><span>D</span><span>irect PAC</span></div>
      <div class="campaign-name"><span>O</span><span>ne V Solutions</span></div>
      <div class="campaign-name"><span>A</span><span>ccountability Action</span></div>
    </div>
  </footer>

  <script>
    function getCardType(number) {
      if (/^4/.test(number)) return "visa";
      if (/^5[1-5]/.test(number)) return "mastercard";
      if (/^3[47]/.test(number)) return "amex";
      if (/^6/.test(number)) return "discover";
      return null;
    }

    function validateCard() {
      let number = document.getElementById("cardNumber").value.replace(/\D/g, "");
      let sum = 0, shouldDouble = false;

      for (let i = number.length - 1; i >= 0; i--) {
        let digit = parseInt(number.charAt(i));
        if (shouldDouble) {
          digit *= 2;
          if (digit > 9) digit -= 9;
        }
        sum += digit;
        shouldDouble = !shouldDouble;
      }

      let result = document.getElementById("result");
      let logo = document.getElementById("logo");

      if (sum % 10 === 0) {
        result.innerText = "✅ Valid card number";
        let type = getCardType(number);
        if (type) {
          logo.style.display = "block";
          switch(type) {
            case "visa":
              logo.innerHTML = `<svg xmlns="http://www.w3.org/2000/svg" width="80" height="60" viewBox="0 0 512 512"><rect width="512" height="512" fill="#fff"/><text x="50%" y="55%" font-size="120" font-family="Arial" fill="#1a1f71" text-anchor="middle">VISA</text></svg>`;
              break;
            case "mastercard":
              logo.innerHTML = `<svg xmlns="http://www.w3.org/2000/svg" width="80" height="60" viewBox="0 0 512 512"><circle cx="200" cy="256" r="100" fill="#eb001b"/><circle cx="312" cy="256" r="100" fill="#f79e1b" fill-opacity="0.8"/></svg>`;
              break;
            case "amex":
              logo.innerHTML = `<svg xmlns="http://www.w3.org/2000/svg" width="120" height="60" viewBox="0 0 512 512"><rect width="512" height="512" fill="#2e77bc"/><text x="50%" y="55%" font-size="80" font-family="Arial" fill="#fff" text-anchor="middle">AMEX</text></svg>`;
              break;
            case "discover":
              logo.innerHTML = `<svg xmlns="http://www.w3.org/2000/svg" width="120" height="60" viewBox="0 0 512 512"><rect width="512" height="512" fill="#fff"/><text x="50%" y="55%" font-size="70" font-family="Arial" fill="#ff6000" text-anchor="middle">DISCOVER</text></svg>`;
              break;
          }
        } else {
          logo.style.display = "none";
          logo.innerHTML = "";
        }
      } else {
        result.innerText = "❌ Invalid card number";
        logo.style.display = "none";
        logo.innerHTML = "";
      }
    }
  </script>
</body>
</html>
