<!DOCTYPE html>
<html>
<head>
  <title>Card Validator</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      background: #fff;
      color: #333;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      min-height: 100vh;
      padding: 40px;
      text-align: center;
    }
    header {
      margin-bottom: 30px;
    }
    header h1 {
      font-size: 20px;
      font-weight: normal;
    }
    input {
      padding: 8px;
      width: 250px;
    }
    button {
      padding: 8px 12px;
      margin-left: 10px;
    }
    #result {
      margin-top: 20px;
      font-weight: bold;
    }
    #logo {
      margin-top: 15px;
      height: 50px;
      display: none;
    }
    .campaign-logos {
      margin-top: 20px;
      display: flex;
      gap: 20px;
      justify-content: center;
    }
    .campaign-logos img {
      height: 40px;
    }
  </style>
</head>
<body>
  <header>
    <h1>Direct PAC | One V Solutions | Accountability Action</h1>
  </header>

  <h2>REMINDERS Card Validator</h2>
  <div>
    <input type="text" id="cardNumber" placeholder="Enter card number">
    <button onclick="validateCard()">Validate</button>
  </div>
  <div id="result"></div>
  <img id="logo" src="" alt="Card Logo">


  <script>
    function getCardType(number) {
      if (/^4/.test(number)) return "visa";
      if (/^5[1-5]/.test(number)) return "mastercard";
      if (/^3[47]/.test(number)) return "amex";
      if (/^6/.test(number)) return "discover";
      return null;
    }

    function validateCard() {
      let number = document.getElementById("cardNumber").value.replace(/\D/g, "");
      let sum = 0, shouldDouble = false;

      for (let i = number.length - 1; i >= 0; i--) {
        let digit = parseInt(number.charAt(i));
        if (shouldDouble) {
          digit *= 2;
          if (digit > 9) digit -= 9;
        }
        sum += digit;
        shouldDouble = !shouldDouble;
      }

      let result = document.getElementById("result");
      let logo = document.getElementById("logo");

      if (sum % 10 === 0) {
        result.innerText = "✅ Valid card number";
        let type = getCardType(number);
        if (type) {
          logo.src = "images/" + type + ".png"; // store logos in /images/
          logo.style.display = "block";
        } else {
          logo.style.display = "none";
        }
      } else {
        result.innerText = "❌ Invalid card number";
        logo.style.display = "none";
      }
    }
  </script>
</body>

</html>
