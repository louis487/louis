```
:root {
--gold: #c9a84c;
--gold-light: #e8c97a;
--gold-dim: rgba(201,168,76,0.15);
--bg: #0a0a0a;
--surface: #111111;
--surface2: #181818;
--border: rgba(201,168,76,0.2);
--text: #f0ece4;
--muted: #5a5652;
--valid: #4caf7a;
--invalid: #c95a5a;
}

html, body {
height: 100%;
background: var(--bg);
color: var(--text);
font-family: 'DM Mono', monospace;
overflow-x: hidden;
}

/* Grain overlay */
body::before {
content: '';
position: fixed;
inset: 0;
background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.75' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='1'/%3E%3C/svg%3E");
opacity: 0.035;
pointer-events: none;
z-index: 9999;
}

/* Ambient glow */
body::after {
content: '';
position: fixed;
top: -20%;
left: 50%;
transform: translateX(-50%);
width: 600px;
height: 600px;
background: radial-gradient(ellipse, rgba(201,168,76,0.06) 0%, transparent 70%);
pointer-events: none;
z-index: 0;
}

.page {
min-height: 100vh;
display: flex;
flex-direction: column;
align-items: center;
justify-content: center;
padding: 40px 20px;
position: relative;
z-index: 1;
}

/* Header */
.brand {
text-align: center;
margin-bottom: 60px;
animation: fadeDown 0.8s ease both;
}

.brand-logo {
display: flex;
align-items: center;
justify-content: center;
gap: 12px;
margin-bottom: 10px;
}

.brand-icon {
width: 36px;
height: 36px;
border: 1.5px solid var(--gold);
border-radius: 6px;
display: flex;
align-items: center;
justify-content: center;
position: relative;
}

.brand-icon::before {
content: '';
position: absolute;
width: 20px;
height: 1.5px;
background: var(--gold);
top: 11px;
}
.brand-icon::after {
content: '';
position: absolute;
width: 14px;
height: 5px;
border: 1.5px solid var(--gold);
border-radius: 2px;
top: 18px;
left: 7px;
}

.brand-name {
font-family: 'Cormorant Garamond', serif;
font-size: 28px;
font-weight: 300;
letter-spacing: 0.1em;
color: var(--text);
}

.brand-name span {
color: var(--gold);
font-weight: 600;
}

.brand-tagline {
font-size: 10px;
letter-spacing: 0.3em;
color: var(--muted);
text-transform: uppercase;
margin-top: 6px;
}

/* Main card */
.card {
width: 100%;
max-width: 520px;
background: var(--surface);
border: 1px solid var(--border);
border-radius: 2px;
padding: 48px 48px 40px;
position: relative;
animation: fadeUp 0.9s ease 0.1s both;
}

.card::before {
content: '';
position: absolute;
top: 0; left: 0; right: 0;
height: 1px;
background: linear-gradient(90deg, transparent, var(--gold), transparent);
}

/* Corner accents */
.card::after {
content: '';
position: absolute;
bottom: -1px; left: -1px;
width: 20px; height: 20px;
border-left: 1px solid var(--gold);
border-bottom: 1px solid var(--gold);
}

.corner-tr {
position: absolute;
top: -1px; right: -1px;
width: 20px; height: 20px;
border-right: 1px solid var(--gold);
border-top: 1px solid var(--gold);
pointer-events: none;
}

.section-label {
font-size: 9px;
letter-spacing: 0.35em;
color: var(--muted);
text-transform: uppercase;
margin-bottom: 32px;
display: flex;
align-items: center;
gap: 12px;
}

.section-label::after {
content: '';
flex: 1;
height: 1px;
background: var(--border);
}

/* Visual card display */
.card-display {
background: linear-gradient(135deg, #1a1a1a 0%, #222 50%, #161616 100%);
border: 1px solid rgba(255,255,255,0.06);
border-radius: 12px;
padding: 28px;
margin-bottom: 36px;
position: relative;
overflow: hidden;
height: 170px;
display: flex;
flex-direction: column;
justify-content: space-between;
}

.card-display::before {
content: '';
position: absolute;
top: -40%;
right: -10%;
width: 280px;
height: 280px;
background: radial-gradient(ellipse, rgba(201,168,76,0.08), transparent 70%);
}

.card-chip {
width: 42px;
height: 32px;
background: linear-gradient(135deg, #c9a84c, #9a7a32);
border-radius: 5px;
position: relative;
overflow: hidden;
}

.card-chip::before {
content: '';
position: absolute;
top: 50%; left: 0; right: 0;
height: 1px;
background: rgba(0,0,0,0.3);
transform: translateY(-50%);
}
.card-chip::after {
content: '';
position: absolute;
top: 0; bottom: 0;
left: 50%;
width: 1px;
background: rgba(0,0,0,0.3);
}

.card-number-display {
font-size: 19px;
letter-spacing: 0.22em;
color: rgba(255,255,255,0.85);
font-family: 'DM Mono', monospace;
font-weight: 300;
transition: all 0.4s ease;
}

.card-bottom {
display: flex;
justify-content: space-between;
align-items: flex-end;
}

.card-label-sm {
font-size: 8px;
letter-spacing: 0.2em;
color: rgba(255,255,255,0.3);
margin-bottom: 4px;
}

.card-network {
font-family: 'Cormorant Garamond', serif;
font-size: 14px;
font-weight: 600;
color: var(--gold);
letter-spacing: 0.05em;
opacity: 0;
transition: opacity 0.4s ease;
}

.card-network.visible { opacity: 1; }

/* Input area */
.input-group {
position: relative;
margin-bottom: 10px;
}

.input-label {
font-size: 9px;
letter-spacing: 0.3em;
color: var(--muted);
text-transform: uppercase;
display: block;
margin-bottom: 12px;
}

.input-wrap {
position: relative;
display: flex;
align-items: center;
}

.card-input {
width: 100%;
background: var(--surface2);
border: 1px solid var(--border);
border-radius: 2px;
padding: 16px 52px 16px 20px;
font-family: 'DM Mono', monospace;
font-size: 15px;
letter-spacing: 0.15em;
color: var(--text);
outline: none;
transition: border-color 0.3s ease, box-shadow 0.3s ease;
caret-color: var(--gold);
}

.card-input::placeholder { color: var(--muted); letter-spacing: 0.1em; }

.card-input:focus {
border-color: rgba(201,168,76,0.5);
box-shadow: 0 0 0 3px rgba(201,168,76,0.06), inset 0 0 20px rgba(201,168,76,0.02);
}

.input-icon {
position: absolute;
right: 16px;
width: 20px;
height: 14px;
pointer-events: none;
}

.input-icon rect {
stroke: var(--muted);
fill: none;
stroke-width: 1.5;
transition: stroke 0.3s;
}

.card-input:focus ~ .input-icon rect { stroke: var(--gold); }

/* Validate button */
.validate-btn {
width: 100%;
padding: 16px;
background: transparent;
border: 1px solid var(--gold);
color: var(--gold);
font-family: 'DM Mono', monospace;
font-size: 10px;
letter-spacing: 0.4em;
text-transform: uppercase;
cursor: pointer;
border-radius: 2px;
position: relative;
overflow: hidden;
margin-top: 28px;
transition: color 0.3s ease;
}

.validate-btn::before {
content: '';
position: absolute;
inset: 0;
background: var(--gold);
transform: scaleX(0);
transform-origin: left;
transition: transform 0.4s cubic-bezier(0.77,0,0.18,1);
z-index: 0;
}

.validate-btn:hover::before { transform: scaleX(1); }
.validate-btn:hover { color: var(--bg); }
.validate-btn span { position: relative; z-index: 1; }

.validate-btn:active { transform: scale(0.99); }

/* Result */
.result-wrap {
margin-top: 28px;
min-height: 60px;
display: flex;
align-items: center;
justify-content: center;
}

.result-box {
width: 100%;
padding: 18px 24px;
border-radius: 2px;
display: flex;
align-items: center;
gap: 14px;
opacity: 0;
transform: translateY(8px);
transition: opacity 0.4s ease, transform 0.4s ease;
}

.result-box.show {
opacity: 1;
transform: translateY(0);
}

.result-box.valid {
background: rgba(76,175,122,0.07);
border: 1px solid rgba(76,175,122,0.25);
}

.result-box.invalid {
background: rgba(201,90,90,0.07);
border: 1px solid rgba(201,90,90,0.25);
}

.result-icon {
width: 32px;
height: 32px;
border-radius: 50%;
display: flex;
align-items: center;
justify-content: center;
flex-shrink: 0;
font-size: 14px;
}

.valid .result-icon { background: rgba(76,175,122,0.15); color: var(--valid); }
.invalid .result-icon { background: rgba(201,90,90,0.15); color: var(--invalid); }

.result-text-wrap {}
.result-title {
font-family: 'Cormorant Garamond', serif;
font-size: 18px;
font-weight: 400;
letter-spacing: 0.05em;
}
.valid .result-title { color: var(--valid); }
.invalid .result-title { color: var(--invalid); }

.result-sub {
font-size: 9px;
letter-spacing: 0.2em;
color: var(--muted);
margin-top: 3px;
}

/* Luhn info */
.luhn-info {
margin-top: 32px;
padding-top: 24px;
border-top: 1px solid rgba(255,255,255,0.04);
display: flex;
gap: 20px;
}

.luhn-stat {
flex: 1;
}

.luhn-stat-label {
font-size: 8px;
letter-spacing: 0.25em;
color: var(--muted);
text-transform: uppercase;
margin-bottom: 6px;
}

.luhn-stat-value {
font-size: 13px;
color: rgba(255,255,255,0.5);
transition: color 0.3s ease;
}

.luhn-stat-value.active { color: var(--gold); }

/* Footer */
.footer {
margin-top: 40px;
text-align: center;
font-size: 9px;
letter-spacing: 0.25em;
color: var(--muted);
animation: fadeUp 1s ease 0.3s both;
}

.footer span { color: rgba(201,168,76,0.4); }

/* Animations */
@keyframes fadeDown {
from { opacity: 0; transform: translateY(-20px); }
to { opacity: 1; transform: translateY(0); }
}

@keyframes fadeUp {
from { opacity: 0; transform: translateY(20px); }
to { opacity: 1; transform: translateY(0); }
}

/* Shimmer on valid */
@keyframes shimmer {
0% { background-position: -200% center; }
100% { background-position: 200% center; }
}

.card-number-display.valid-shimmer {
background: linear-gradient(90deg, rgba(255,255,255,0.6) 0%, var(--gold-light) 40%, rgba(255,255,255,0.6) 80%);
background-size: 200% auto;
-webkit-background-clip: text;
-webkit-text-fill-color: transparent;
background-clip: text;
animation: shimmer 2s linear;
}

<script>
const cardInput = document.getElementById('cardNumber');
const cardDisplay = document.getElementById('cardDisplay');
const cardNetwork = document.getElementById('cardNetwork');
const digitCount = document.getElementById('digitCount');

function detectNetwork(number) {
if (/^4/.test(number)) return 'Visa';
if (/^5[1-5]/.test(number) || /^2[2-7]/.test(number)) return 'Mastercard';
if (/^3[47]/.test(number)) return 'Amex';
if (/^6(?:011|5)/.test(number)) return 'Discover';
if (/^35/.test(number)) return 'JCB';
return null;
}

function formatDisplay(raw) {
if (!raw) return '•••• •••• •••• ••••';
const groups = [];
for (let i = 0; i < raw.length; i += 4) groups.push(raw.slice(i, i + 4));
const full = groups.join(' ');
const remaining = 19 - full.length;
return full + (remaining > 0 ? ' ' + '•'.repeat(remaining).replace(/(.{4})/g, '$1 ').trim() : '');
}

cardInput.addEventListener('input', (e) => {
let raw = e.target.value.replace(/\D/g, '').slice(0, 19);
// Format with spaces
let formatted = raw.replace(/(.{4})/g, '$1 ').trim();
e.target.value = formatted;

// Update visual display
cardDisplay.className = 'card-number-display';
cardDisplay.style.webkitTextFillColor = '';
cardDisplay.style.backgroundClip = '';

const displayStr = raw.slice(0, 4).padEnd(4, '•') + ' ' +
(raw.length > 4 ? raw.slice(4,8).padEnd(4,'•') : '••••') + ' ' +
(raw.length > 8 ? raw.slice(8,12).padEnd(4,'•') : '••••') + ' ' +
(raw.length > 12 ? raw.slice(12,16).padEnd(4,'•') : '••••');
cardDisplay.textContent = raw.length > 0 ? displayStr : '•••• •••• •••• ••••';

// Network
const net = detectNetwork(raw);
cardNetwork.textContent = net || '—';
cardNetwork.classList.toggle('visible', !!net);

// Digit count
digitCount.textContent = raw.length > 0 ? `${raw.length} digits` : '— digits';

// Update stats
document.getElementById('statDigits').textContent = raw.length > 0 ? raw.length : '—';
document.getElementById('statDigits').classList.toggle('active', raw.length > 0);
document.getElementById('statNetwork').textContent = net || '—';
document.getElementById('statNetwork').classList.toggle('active', !!net);
document.getElementById('statChecksum').textContent = '—';
document.getElementById('statChecksum').classList.remove('active');
document.getElementById('statStatus').textContent = 'Pending';
document.getElementById('statStatus').classList.remove('active');

// Hide result
document.getElementById('resultBox').classList.remove('show', 'valid', 'invalid');
});

function luhn(number) {
let sum = 0, shouldDouble = false;
for (let i = number.length - 1; i >= 0; i--) {
let digit = parseInt(number.charAt(i));
if (shouldDouble) {
digit *= 2;
if (digit > 9) digit -= 9;
}
sum += digit;
shouldDouble = !shouldDouble;
}
return { sum, valid: sum % 10 === 0 };
}

function validateCard() {
const raw = cardInput.value.replace(/\D/g, '');

if (raw.length < 12) {
showResult(false, 'Insufficient Digits', 'Enter at least 12 digits to validate');
return;
}

const { sum, valid } = luhn(raw);
const net = detectNetwork(raw);

// Update stats
document.getElementById('statChecksum').textContent = sum;
document.getElementById('statChecksum').classList.add('active');
document.getElementById('statStatus').textContent = valid ? 'Valid' : 'Invalid';
document.getElementById('statStatus').classList.add('active');

if (valid) {
cardDisplay.classList.add('valid-shimmer');
showResult(true, 'Card Validated', `Luhn checksum passed — ${net ? net + ' network' : 'network undetected'}`);
} else {
showResult(false, 'Validation Failed', `Checksum ${sum} — not divisible by 10`);
}
}

function showResult(valid, title, sub) {
const box = document.getElementById('resultBox');
const icon = document.getElementById('resultIcon');
const titleEl = document.getElementById('resultTitle');
const subEl = document.getElementById('resultSub');

box.classList.remove('show', 'valid', 'invalid');

requestAnimationFrame(() => {
box.classList.add(valid ? 'valid' : 'invalid');
icon.textContent = valid ? '✓' : '✕';
titleEl.textContent = title;
subEl.textContent = sub;

requestAnimationFrame(() => box.classList.add('show'));
});
}

// Allow Enter key
cardInput.addEventListener('keydown', (e) => {
if (e.key === 'Enter') validateCard();
});
</script>
